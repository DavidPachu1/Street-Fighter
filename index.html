<body>

                </td>
            </tr>
            <tr>
                <td>
                    <span class="nombre">Ryu</span>
                    <img src="img/Ryu.png" alt="Ryu" class="personaje">
                </td>
                <td>
                    <span class="nombre">E Honda</span>
                    <img src="img/EHonda.png" alt="E Honda" class="personaje">
                </td>
                <td>
                    <span class="nombre">Blanka</span>
                    <img src="img/Blanka.png" alt="Blanka" class="personaje">
                </td>
                <td>

                    <img src="img/Guille.png" alt="" class="personaje">

            <tr>

                <td>

                    <img src="img/DeeJay.png" alt="Dee Jay" class="personaje">

                <td>
                    <span class="nombre">Balrog</span>

                </td>
            </tr>
        </tbody>
    </table>

    <h2>Formulario de Inscripcion para jugar a Street Fighter</h2>
    <form action="#">
        <fieldset>
            <legend>Datos Personales</legend>

            <label for="nombre">Nombre:</label>
            <input type="text" name="nombre" id="nombre">

            <label for="apellido">Apellido:</label>
            <input type="text" name="apellido" id="apellido">

            <label for="calle">Dirección Postal:
                <input type="text" name="calle" id="calle" 
                placeholder="Calle">
                <input type="number" name="numero" id="numero" 
                placeholder="Nº">
                <input type="text" name="piso" id="piso" 
                placeholder="Piso">
                <input type="text" name="codpostal" id="codpostal" 
                placeholder="Codpostal">
                <input type="text" name="ciudad" id="ciudad" 
                placeholder="Ciudad">
            </label>
        </fieldset>

        <fieldset>
            <legend>Sexo Usuario</legend>
            <label><input type="radio" name="sexo" id="hombre">Hombre</label>
            <label><input type="radio" name="sexo" id="mujer">mujer</label>
            <label><input type="radio" name="sexo" id="nsnc">Prefiero No Decir</label>
        </fieldset>

        <fieldset>
            <legend>Fecha de nacimiento</legend>
            <label for="fnac">Fecha de nacimiento:<input type="date" name="fnac" id="fnac"></label>
        </fieldset>

        <fieldset>
            <legend>Personajes</legend>
            <label>Selecciona el personaje: <input type="text" name="personaje" id="personaje"></label>

            <label for="personaje2">Selecciona el personaje: </label>
            <select name="personaje2" id="personaje2">
                <option value="Ken">Ken</option>
                <option value="Riu">Riu</option>
                <option value="Mr Bison">Mr Bison</option>
            </select>
        </fieldset>

        <fieldset>
            <legend>Comentarios: </legend>
            <label for="comentarios">Comentarios</label>
            <textarea name="Comentarios" id="comentarios"></textarea>
        </fieldset>

        <div class="botonera">
            <input type="submit" value="Enviar">
            <input type="reset" value="Borrar">
        </div>
    </form>

</body>

</html>
